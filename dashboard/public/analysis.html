<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA LINE ANALYSIS & BOOKMAKER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap');
  :root { --bg:#030508;--panel:#0a0e14;--panel2:#0d1219;--border:#1a2a3a;--border-glow:#0f4f6f;--cyan:#00e5ff;--green:#00ff88;--amber:#ffb300;--red:#ff3d3d;--magenta:#ff00ff;--text:#c8d6e5;--dim:#4a5568;--blue:#3498db;--purple:#9b59b6; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;min-height:100vh;}
  body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,0.015) 2px,rgba(0,229,255,0.015) 4px);pointer-events:none;z-index:9999;}
  .header{background:linear-gradient(180deg,#0a1520,var(--bg));border-bottom:1px solid var(--border-glow);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .logo{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .logo-sub{font-size:9px;color:var(--dim);letter-spacing:4px;text-transform:uppercase;}
  .nav-links{display:flex;gap:12px;flex-wrap:wrap;}
  .nav-links a{color:var(--dim);text-decoration:none;font-size:10px;font-family:'Orbitron',sans-serif;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;border:1px solid var(--border);border-radius:3px;transition:all .2s;}
  .nav-links a:hover,.nav-links a.active{color:var(--cyan);border-color:var(--border-glow);background:rgba(0,229,255,0.05);}
  .main{max-width:1400px;margin:0 auto;padding:12px;}
  select,input[type=number],input[type=text]{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:6px 10px;font-family:'JetBrains Mono',monospace;font-size:11px;border-radius:4px;}
  select:focus,input:focus{border-color:var(--cyan);outline:none;}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:12px;}
  .panel-header{background:linear-gradient(90deg,rgba(0,229,255,0.08),transparent);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);}
  .panel-body{padding:12px;overflow-x:auto;}
  .tab-row{display:flex;gap:0;border-bottom:1px solid var(--border);}
  .tab{padding:8px 16px;font-size:10px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:'Orbitron',sans-serif;letter-spacing:1px;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}
  .edge-table{width:100%;border-collapse:collapse;font-size:11px;min-width:800px;}
  .edge-table th{text-align:left;padding:6px 8px;color:var(--dim);font-size:9px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);background:var(--panel);cursor:pointer;}
  .edge-table th:hover{color:var(--cyan);}
  .edge-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.03);}
  .edge-table tr:hover td{background:rgba(0,229,255,0.03);}
  .edge-pos{color:var(--green);font-weight:700;}
  .edge-neg{color:var(--red);}
  .edge-huge{color:var(--green);font-weight:700;text-shadow:0 0 6px rgba(0,255,136,0.3);}
  .edge-bar{display:inline-block;height:5px;border-radius:3px;vertical-align:middle;margin-left:3px;}
  .stat-badge{display:inline-block;padding:1px 5px;border-radius:2px;font-size:9px;font-weight:600;}
  .stat-PTS{background:rgba(0,229,255,0.15);color:var(--cyan);}
  .stat-REB{background:rgba(0,255,136,0.12);color:var(--green);}
  .stat-AST{background:rgba(155,89,182,0.15);color:var(--purple);}
  .stat-3PM{background:rgba(255,179,0,0.15);color:var(--amber);}
  .stat-BLK{background:rgba(255,61,61,0.12);color:var(--red);}
  .stat-STL{background:rgba(52,152,219,0.15);color:var(--blue);}
  .fit-badge{font-size:8px;padding:1px 4px;border-radius:2px;}
  .fit-Excellent{background:rgba(0,255,136,0.15);color:var(--green);}
  .fit-Good{background:rgba(0,229,255,0.1);color:var(--cyan);}
  .fit-Fair{background:rgba(255,179,0,0.1);color:var(--amber);}
  .fit-Poor{background:rgba(255,61,61,0.1);color:var(--red);}
  .summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:12px;}
  .summary-card{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center;}
  .summary-card .val{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;}
  .summary-card .lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
  .filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
  .filter-btn{background:rgba(0,229,255,0.06);border:1px solid var(--border);color:var(--dim);padding:3px 8px;font-family:'JetBrains Mono',monospace;font-size:10px;border-radius:3px;cursor:pointer;transition:all .15s;}
  .filter-btn:hover,.filter-btn.active{color:var(--cyan);border-color:var(--cyan);background:rgba(0,229,255,0.12);}
  .filter-btn.green.active{color:var(--green);border-color:var(--green);background:rgba(0,255,136,0.12);}
  .loading{text-align:center;padding:30px;color:var(--dim);}
  .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  /* Book styles */
  .book-line{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px;}
  .book-line:hover{border-color:var(--border-glow);}
  .book-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .book-maker{font-size:9px;color:var(--dim);}
  .book-odds{display:flex;gap:6px;margin-bottom:6px;}
  .book-side{flex:1;background:rgba(0,229,255,0.04);border:1px solid var(--border);border-radius:4px;padding:6px;text-align:center;cursor:pointer;transition:all .15s;}
  .book-side:hover{border-color:var(--cyan);background:rgba(0,229,255,0.08);}
  .book-side.selected{border-color:var(--green);background:rgba(0,255,136,0.1);}
  .book-bets{font-size:10px;color:var(--dim);border-top:1px solid var(--border);padding-top:6px;margin-top:4px;}
  .form-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
  .form-row label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;min-width:50px;}
  .btn{background:linear-gradient(135deg,rgba(0,255,136,0.2),rgba(0,229,255,0.2));color:var(--green);border:1px solid var(--green);padding:8px 16px;font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;border-radius:4px;cursor:pointer;transition:all .2s;}
  .btn:hover{background:rgba(0,255,136,0.3);}
  .btn:disabled{opacity:0.3;cursor:not-allowed;}
  .btn-sm{padding:4px 10px;font-size:9px;}
  @media(max-width:900px){.summary-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div class="header">
  <div>
    <div style="font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,#d4a825,#f5d442);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 30px rgba(212,168,37,0.3);">HxM</div><div style="font-size:9px;color:#6b5b1f;letter-spacing:3px;">HunterxMafia</div>
  </div>
  <div class="nav-links">
    <a href="/terminal.html">Terminal</a>
    <a href="/matchup.html">Matchup</a>
    <a href="/slips.html">Slips</a>
    <a href="/bracket.html">Bracket</a>
    <a href="/analysis.html" class="active">Analysis</a>
  </div>
</div>

<div class="main">
  <div class="tab-row">
    <div class="tab active" onclick="setTab('analysis',this)">Edge Finder</div>
    <div class="tab" onclick="setTab('book',this)">In-House Book</div>
  </div>

  <!-- ANALYSIS TAB -->
  <div id="tab-analysis">
    <div style="margin:12px 0;">
      <select id="game-select" onchange="analyzeGame()">
        <option value="">-- Pick a game to analyze --</option>
      </select>
    </div>
    <div class="summary-grid" id="summary" style="display:none;">
      <div class="summary-card"><div class="val" style="color:var(--cyan);" id="s-total">0</div><div class="lbl">Props</div></div>
      <div class="summary-card"><div class="val edge-pos" id="s-edges">0</div><div class="lbl">Over Edges</div></div>
      <div class="summary-card"><div class="val" style="color:var(--amber);" id="s-under">0</div><div class="lbl">Under Edges</div></div>
      <div class="summary-card"><div class="val" style="color:var(--purple);" id="s-best">--</div><div class="lbl">Best Edge</div></div>
    </div>
    <div class="filter-row" id="filters" style="display:none;">
      <button class="filter-btn active" onclick="setFilter('all',this)">ALL</button>
      <button class="filter-btn" onclick="setFilter('PTS',this)">PTS</button>
      <button class="filter-btn" onclick="setFilter('REB',this)">REB</button>
      <button class="filter-btn" onclick="setFilter('AST',this)">AST</button>
      <button class="filter-btn" onclick="setFilter('3PM',this)">3PM</button>
      <button class="filter-btn" onclick="setFilter('STL',this)">STL</button>
      <button class="filter-btn" onclick="setFilter('BLK',this)">BLK</button>
      <span style="width:12px;"></span>
      <button class="filter-btn green" id="edge-btn" onclick="toggleEdge(this)">EDGES ONLY</button>
      <button class="filter-btn" id="sort-btn" onclick="toggleSort(this)">SORT BY EDGE</button>
    </div>
    <div id="results">
      <div class="panel"><div class="panel-body" style="text-align:center;color:var(--dim);padding:30px;">Select a game above to run Poisson edge analysis on all player props</div></div>
    </div>
  </div>

  <!-- BOOKMAKER TAB -->
  <div id="tab-book" style="display:none;">
    <div class="panel" style="margin-top:12px;">
      <div class="panel-header" style="color:var(--amber);">Create a Line</div>
      <div class="panel-body">
        <div class="form-row">
          <label>Player</label><input type="text" id="bk-player" placeholder="LaMelo Ball" style="flex:1;">
          <label>Stat</label>
          <select id="bk-stat" style="width:80px;"><option>PTS</option><option>REB</option><option>AST</option><option>3PM</option><option>STL</option><option>BLK</option><option>PRA</option></select>
        </div>
        <div class="form-row">
          <label>Line</label><input type="number" id="bk-line" placeholder="22.5" step="0.5" style="width:80px;">
          <label>Over</label><input type="number" id="bk-over" value="-110" style="width:80px;">
          <label>Under</label><input type="number" id="bk-under" value="-110" style="width:80px;">
          <label>Max $</label><input type="number" id="bk-max" value="500" style="width:80px;">
        </div>
        <div class="form-row">
          <label>Game</label><input type="text" id="bk-game" placeholder="MIA @ CHA" style="flex:1;">
          <button class="btn" onclick="createLine()">POST LINE</button>
        </div>
        <div id="bk-error" style="color:var(--red);font-size:10px;margin-top:4px;"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        Open Lines
        <span style="font-family:'JetBrains Mono',monospace;font-size:10px;" id="book-count">0</span>
      </div>
      <div class="panel-body" id="book-lines">
        <div style="color:var(--dim);text-align:center;padding:20px;">No lines posted yet. Be the house.</div>
      </div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const authToken = localStorage.getItem('nba_token');
const authH = () => ({ 'Content-Type':'application/json', ...(authToken ? {'Authorization':`Bearer ${authToken}`} : {}) });

let allRows = [];
let statFilter = 'all';
let edgeOnly = false;
let sortEdge = false;

function setTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  $('tab-analysis').style.display = tab === 'analysis' ? '' : 'none';
  $('tab-book').style.display = tab === 'book' ? '' : 'none';
  if (tab === 'book') loadBook();
}

// === EDGE FINDER ===
async function init() {
  const res = await fetch('/api/sweep');
  const data = await res.json();
  const games = data.games || [];
  const sel = $('game-select');
  sel.innerHTML = '<option value="">-- Pick a game --</option>' +
    games.map((g, i) => {
      const t = new Date(g.date).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
      return `<option value="${i}">${g.away.abbr} @ ${g.home.abbr} — ${t}</option>`;
    }).join('');
}

async function analyzeGame() {
  const idx = $('game-select').value;
  if (!idx) return;

  $('results').innerHTML = '<div class="loading"><div class="spinner"></div><br>Running Poisson model on all players...<br><span style="font-size:10px;color:var(--dim);">Fetching gamelogs for both rosters</span></div>';
  $('summary').style.display = 'none';
  $('filters').style.display = 'none';

  const res = await fetch(`/api/analysis/game/${idx}`);
  const data = await res.json();

  if (data.error) {
    $('results').innerHTML = `<div class="panel"><div class="panel-body" style="color:var(--red);">${data.error}</div></div>`;
    return;
  }

  allRows = data.rows || [];

  // Add book line comparison — use -115 as default book odds for model lines
  allRows.forEach(r => {
    r.bookOverOdds = -115;
    r.bookUnderOdds = -115;
    r.bookOverImpl = 53.5;
    r.bookUnderImpl = 53.5;
    r.overEdge = +(r.modelOverProb - 53.5).toFixed(1);
    r.underEdge = +(r.modelUnderProb - 53.5).toFixed(1);
  });

  renderAnalysis();
}

function renderAnalysis() {
  $('summary').style.display = '';
  $('filters').style.display = 'flex';

  let rows = [...allRows];
  if (statFilter !== 'all') rows = rows.filter(r => r.stat === statFilter);
  if (edgeOnly) rows = rows.filter(r => r.overEdge > 3 || r.underEdge > 3);
  if (sortEdge) rows.sort((a, b) => Math.max(b.overEdge, b.underEdge) - Math.max(a.overEdge, a.underEdge));

  // Summary
  $('s-total').textContent = allRows.length;
  $('s-edges').textContent = allRows.filter(r => r.overEdge > 3).length;
  $('s-under').textContent = allRows.filter(r => r.underEdge > 3).length;
  const best = allRows.reduce((b, r) => Math.max(r.overEdge, r.underEdge) > b.e ? { ...r, e: Math.max(r.overEdge, r.underEdge) } : b, { e: 0 });
  $('s-best').textContent = best.player ? `${best.player} ${best.stat} +${best.e}%` : '--';

  if (!rows.length) {
    $('results').innerHTML = '<div class="panel"><div class="panel-body" style="text-align:center;color:var(--dim);">No props match filters</div></div>';
    return;
  }

  const fmtEdge = (e) => {
    const cls = e > 5 ? 'edge-huge' : e > 3 ? 'edge-pos' : e < -3 ? 'edge-neg' : '';
    const bar = `<span class="edge-bar" style="width:${Math.min(Math.abs(e)*3,50)}px;background:${e>0?'var(--green)':'var(--red)'};"></span>`;
    return `<span class="${cls}">${e>0?'+':''}${e}%</span>${bar}`;
  };
  const fmtOdds = (o) => (o > 0 ? '+' : '') + o;

  $('results').innerHTML = `
    <div class="panel">
      <div class="panel-header">Poisson Model vs -115 Book Lines <span style="font-family:'JetBrains Mono',monospace;font-size:10px;">${rows.length} props</span></div>
      <div class="panel-body">
        <table class="edge-table">
          <thead><tr>
            <th>Player</th><th>Stat</th><th>Line</th><th>Mean±SD</th>
            <th>Model O%</th><th>Model Odds</th><th>Over Edge</th>
            <th>Model U%</th><th>Under Edge</th>
            <th>Actual O%</th><th>Fit</th><th>Disp</th>
          </tr></thead>
          <tbody>${rows.map(r => `
            <tr>
              <td style="font-weight:500;">${r.player} <span style="color:var(--dim);font-size:9px;">${r.team}</span></td>
              <td><span class="stat-badge stat-${r.stat}">${r.stat}</span></td>
              <td style="font-weight:700;">${r.line}</td>
              <td style="color:var(--dim);">${r.mean}±${r.stdDev}</td>
              <td style="color:var(--purple);font-weight:600;">${r.modelOverProb}%</td>
              <td>${fmtOdds(r.modelOverOdds)}</td>
              <td>${fmtEdge(r.overEdge)}</td>
              <td style="color:var(--purple);">${r.modelUnderProb}%</td>
              <td>${fmtEdge(r.underEdge)}</td>
              <td>${r.actualOverPct}%</td>
              <td><span class="fit-badge fit-${r.poissonFit}">${r.poissonFit}</span></td>
              <td style="color:${r.dispersion>1.5?'var(--amber)':'var(--dim)'};">${r.dispersion}</td>
            </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`;
}

function setFilter(v, btn) { statFilter = v; document.querySelectorAll('#filters .filter-btn:not(.green)').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderAnalysis(); }
function toggleEdge(btn) { edgeOnly = !edgeOnly; btn.classList.toggle('active'); renderAnalysis(); }
function toggleSort(btn) { sortEdge = !sortEdge; btn.classList.toggle('active'); renderAnalysis(); }

// === IN-HOUSE BOOKMAKER ===
async function createLine() {
  $('bk-error').textContent = '';
  const body = {
    player: $('bk-player').value,
    stat: $('bk-stat').value,
    line: $('bk-line').value,
    overOdds: $('bk-over').value,
    underOdds: $('bk-under').value,
    game: $('bk-game').value,
    maxWager: $('bk-max').value
  };
  if (!body.player || !body.line) { $('bk-error').textContent = 'Player and Line required'; return; }

  const res = await fetch('/api/book/lines', { method: 'POST', headers: authH(), body: JSON.stringify(body) });
  const data = await res.json();
  if (data.error) { $('bk-error').textContent = data.error; return; }

  $('bk-player').value = '';
  $('bk-line').value = '';
  $('bk-game').value = '';
  loadBook();
}

async function loadBook() {
  const res = await fetch('/api/book/lines');
  const lines = await res.json();
  $('book-count').textContent = lines.length;

  if (!lines.length) {
    $('book-lines').innerHTML = '<div style="color:var(--dim);text-align:center;padding:20px;">No lines posted yet. Be the house.</div>';
    return;
  }

  $('book-lines').innerHTML = lines.map(l => {
    const oImpl = (l.overOdds < 0 ? Math.abs(l.overOdds)/(Math.abs(l.overOdds)+100)*100 : 100/(l.overOdds+100)*100).toFixed(0);
    const uImpl = (l.underOdds < 0 ? Math.abs(l.underOdds)/(Math.abs(l.underOdds)+100)*100 : 100/(l.underOdds+100)*100).toFixed(0);
    const totalBet = l.bets.reduce((a, b) => a + b.wager, 0);
    const remaining = l.maxWager - totalBet;

    return `
      <div class="book-line">
        <div class="book-header">
          <div>
            <span style="font-weight:700;font-size:13px;">${l.player}</span>
            <span class="stat-badge stat-${l.stat}" style="margin-left:4px;">${l.stat}</span>
            <span style="font-weight:700;font-size:14px;margin-left:8px;color:var(--cyan);">${l.line}</span>
          </div>
          <div>
            <span class="book-maker">by ${l.makerDisplay}</span>
            ${l.game ? `<span style="color:var(--dim);font-size:9px;margin-left:6px;">${l.game}</span>` : ''}
          </div>
        </div>
        <div class="book-odds">
          <div class="book-side" onclick="betLine('${l.id}','over',this)">
            <div style="font-size:9px;color:var(--dim);">OVER</div>
            <div style="font-size:16px;font-weight:700;color:var(--green);">${l.overOdds > 0 ? '+' : ''}${l.overOdds}</div>
            <div style="font-size:8px;color:var(--purple);">${oImpl}% impl</div>
          </div>
          <div class="book-side" onclick="betLine('${l.id}','under',this)">
            <div style="font-size:9px;color:var(--dim);">UNDER</div>
            <div style="font-size:16px;font-weight:700;color:var(--red);">${l.underOdds > 0 ? '+' : ''}${l.underOdds}</div>
            <div style="font-size:8px;color:var(--purple);">${uImpl}% impl</div>
          </div>
        </div>
        <div style="font-size:9px;color:var(--dim);display:flex;justify-content:space-between;">
          <span>Max: $${l.maxWager}</span>
          <span style="color:${remaining > 0 ? 'var(--green)' : 'var(--red)'};">$${remaining} remaining</span>
        </div>
        ${l.bets.length ? `
          <div class="book-bets">
            ${l.bets.map(b => `
              <div style="display:flex;justify-content:space-between;padding:2px 0;">
                <span>${b.userDisplay} — <span style="color:${b.side==='over'?'var(--green)':'var(--red)'};">${b.side.toUpperCase()}</span></span>
                <span>$${b.wager} → $${b.payout}</span>
              </div>`).join('')}
          </div>` : ''}
      </div>`;
  }).join('');
}

let selectedBet = null;
function betLine(lineId, side, el) {
  document.querySelectorAll('.book-side.selected').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');

  const wager = prompt(`Bet ${side.toUpperCase()} — Enter wager amount:`);
  if (!wager || isNaN(wager) || parseFloat(wager) < 1) return;

  fetch('/api/book/bet', {
    method: 'POST',
    headers: authH(),
    body: JSON.stringify({ lineId, side, wager: parseFloat(wager) })
  }).then(r => r.json()).then(data => {
    if (data.error) alert(data.error);
    else loadBook();
    el.classList.remove('selected');
  });
}

init();
loadBook();
setInterval(loadBook, 30000);
</script>
